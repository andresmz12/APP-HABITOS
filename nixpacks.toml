[phases.setup]
nixPkgs = ["nodejs_20", "openssl", "libc6-compat"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = [
  "DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy npx prisma generate",
  "npx next build"
]

[start]
cmd = "npx prisma db push --accept-data-loss && npx next start -p ${PORT:-3000}"
